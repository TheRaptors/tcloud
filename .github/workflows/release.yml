name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
          - goos: windows
            goarch: arm64
            suffix: .exe
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BINARY_NAME=tcloud_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.suffix }}
          go build -ldflags="-s -w" -o dist/${BINARY_NAME} ./cmd/tcloud

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcloud_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/tcloud_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest ${{ github.ref_name }}
          git push -f origin latest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## 下载对应平台的二进制文件

            | 文件 | 平台 |
            |------|------|
            | `tcloud_windows_amd64.exe` | Windows 64位 |
            | `tcloud_windows_arm64.exe` | Windows ARM64 |
            | `tcloud_linux_amd64` | Linux 64位 |
            | `tcloud_linux_arm64` | Linux ARM64 |
            | `tcloud_darwin_amd64` | macOS Intel |
            | `tcloud_darwin_arm64` | macOS Apple Silicon |

            ### 使用方法

            1. 下载对应平台的二进制文件
            2. 在同目录下创建 `config/tencentcloud.json`（参考 `config/tencentcloud.json.example`）
            3. 运行 `./tcloud deploy`
